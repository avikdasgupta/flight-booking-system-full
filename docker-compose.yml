version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flight-db
    environment:
      POSTGRES_USER: flight_user
      POSTGRES_PASSWORD: flight_password_secure
      POSTGRES_DB: flight_booking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flight_user -d flight_booking_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flight-network

  redis:
    image: redis:7-alpine
    container_name: flight-cache
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis_password_secure
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flight-network

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: flight-api
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: flight_user
      DATABASE_PASSWORD: flight_password_secure
      DATABASE_NAME: flight_booking_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_password_secure
      JWT_SECRET: your_jwt_secret_key_change_in_production
      API_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flight-network
    restart: unless-stopped

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: flight-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:3001/api
      NEXT_PUBLIC_APP_NAME: Flight Booking System
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - flight-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  flight-network:
    driver: bridge
